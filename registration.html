<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carve & Co. | Sign Up</title>
    <link rel="stylesheet" href="css/login_registration.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="site-header">
        <!-- ***  the navigation parent container *** -->
        <!-- ---------------------------------------  -->
        <!-- the nav container has 3 children  
             1- left div for the logo and navigation links on the the left 
             2- middle div for a search bar in the middle of nav
             3- right div for more links -wishlist- & -cart-  -->
        <nav class="site-nav">


            <!-- ------------------------------- -->
            <!-- nav first child  : nav-left -->
            <!-- --------------------------- -->
            <!-- it has 2 children 
                1- the logo/wordmark: works as a link to home page
                2- unordered list with 4 list item 
                   each list item is a button that will summon their own menu-->
            <div class="nav-left">
                <!-- logo replacement for now -->
                <a href="index.html" class="nav-logo">Carve&amp;Co.</a>

                <ul class="nav-links">

                    <li>
                        <button 
                            class="nav-btn"
                            id="shop-btn"
                            type="button"
                            aria-expanded="false"
                            aria-controls="shop-panel"
                        >   
                            Shop
                        </button>
                    </li>

                    <li>
                        <button 
                            class="nav-btn"
                            id="featured-btn"
                            type="button"
                            aria-expanded="false"
                            aria-controls="featured-panel"
                        >
                        Featured
                        </button>
                    </li>

                    <li>
                        <button
                            class="nav-btn"
                            id="deals-btn"
                            type="button"
                            aria-expanded="false"
                            aria-controls="deals-panel"
                        >
                            Deals
                        </button>
                    </li>
                    <!-- <li><button class="nav-btn">Services</button></li> -->
                </ul>
            </div>

            <!-- ------------------------------- -->
            <!-- nav second child  : nav-search  -->
            <!-- ------------------------------- -->
            <!-- a form element with one input and one submit button 
                1- the input element : is for typing search words
                2- the button is to do the search 
            -->
            <div class="nav-search">
                <form class="search-form" action="#" role="search">
                     <label for="site-search" class="sr-only">Search Carve &amp; Co.</label>

                     <button type="submit" class="search-submit-btn" aria-label="Submit search">
                        <img src="images/ui/icons/icon-search.svg" alt="" class="icon">
                     </button>

                     <input
                        type="search"
                        id="site-search"
                        name="site-search"
                        class="search-input"
                        placeholder="Search Carve &amp; Co."
                        autocomplete="off" 
                    >
                </form>
                <!--  most common search -->
                <!--  
                        for demo purposese only they are hard coded 
                        in the future : 
                        1- populate a common seaches list 
                        2- populate a recent searches list 
                  
                -->
                <div class="search-dropdown" id="search-dropdown" hidden>
                    <p class="search-dropdown-title">Common searches</p>

                    <div class="search-common-list">
                        <a href="#" class="search-suggestion-link">coffee table</a>
                        <a href="#" class="search-suggestion-link">floating shelf</a>
                        <a href="#" class="search-suggestion-link">wood decor</a>
                        <a href="#" class="search-suggestion-link">storage</a>
                    </div>
                </div>
            </div>

            <!-- ------------------------------- -->
            <!-- nav third child  : nav-right    -->
            <!-- ------------------------------- -->
            <div class="nav-right">
                <a href="addProduct.html" id="add-product-link" class="nav-icon-link" aria-label="add product">
                    <img src="images/ui/icons/icon-plus.svg" alt="" class="icon">
                </a>
                <a href="login.html" id="login-link" class="nav-icon-link" aria-label="login">
                    <img src="images/ui/icons/icon-user.svg" alt="" class="icon">
                </a>
                <a href="favorites.html" class="nav-icon-link" aria-label="Wishlist">
                    <img src="images/ui/icons/icon-heart.svg" alt="" class="icon">
                </a>
                <a href="cart.html" class="nav-icon-link" aria-label="Cart">
                    <img src="images/ui/icons/icon-cart.svg" alt="" class="icon">
                    <span class="cart-badge">0</span>  <!-- counter for cart -->
                </a>
                <button 
                    type="button"
                    class="hamburger-btn"
                    aria-label="Open menu"
                    aria-expanded="false"
                >
                    <img src="images/ui/icons/icon-menu.svg" alt="" class="icon" >
                </button>
            </div>
        
        <!-- end of nav -->
        <!-- ---------------------------------------  -->
        </nav>
    
         <!-- the overlay will always dispaly under the nave special panels -->
        <div class="nav-overlay" id="nav-overlay" >
            <!-- will be activated when the nav menue panel drop -->
        </div>

        <!--  ----------------------------------------------------------------------- -->
        <!--  ------------------ desktop breakpoint specific ------------------------ -->
        <!--  ----------------------------------------------------------------------- -->


        <!-- ---------------------------------------------------------------------->
        <!--                         nav-links panels                            -->
        <!-- ---------------------------------------------------------------------->

        <!--****      -------------         ****-->
        <!--****       shop panel           ****-->
        <!--****      -------------         ****-->
        <!-- a menu drops when the user click the shop button the menu has two options :
            1- shop all : to go to a separate page with all the products
            2- shop by category : it displays the 3 categoies swe currently have
                shop by category is a future feature the buttons dont take the user anywhere 
                but in the future the will take the user to a shop page with a category filter 
        -->
        <section class="shop-panel" id="shop-panel">
            <div class="shop-panel-inner">
                
                <a href="products.html?filter=all" class="shop-all-link">Shop all</a>

                <div class="shop-categories">
                    <button type="button" class="shop-category-card">

                        <div class="shop-category-image-wrapper">
                            <img src="images/categories/shelves.webp" alt="Wood shelves category" class="shop-category-image">                            
                        </div>
                        <span class="shop-category-label">Shelves</span>

                    </button>

                    <button type="button" class="shop-category-card">

                        <div class="shop-category-image-wrapper">
                            <img src="images/categories/tables.webp" alt="Wood tables category" class="shop-category-image">
                        </div>
                        <span class="shop-category-label">Tables</span>
                        
                    </button>

                    <button type="button" class="shop-category-card">

                        <div class="shop-category-image-wrapper">
                            <img src="images/categories/accessories.webp" alt="Wood accessories category" class="shop-category-image">   
                        </div>
                        <span class="shop-category-label">Accessories</span>
                
                    </button>
                </div>

            </div>
        </section>

        <!--****      ---------------        ****-->
        <!--****       featured panel        ****-->
        <!--****      ---------------        ****-->
        <!-- the featured panel shows the user an option to filter the featured by tag
            it dispalys a list of tag 
            and under it a list of product that belong to the active tag
            and next to it an option to veiw all feature products 
        -->
        <section class="featured-panel" id="featured-panel" >
            <div class="featured-panel-inner">
                <div class="featured-tags-section">
                    <button type="button" class="featured-tags-arrow featured-tags-arrow-left" aria-label="Scroll tags left">
                        <img src="images/ui/arrows/arrow.svg" alt="" class="icon">
                    </button>

                    <div class="featured-tags-wrapper">
                        <div class="featured-tags">
                            <!-- buttons -->
                        </div>
                    </div>

                    <button type="button" class="featured-tags-arrow featured-tags-arrow-right" aria-label="Scroll tags right">
                        <img src="images/ui/arrows/arrow.svg" alt="" class="icon">
                    </button>
                </div>
                 
                <div class="featured-products">
                    <a href="products.html?filter=featured" class="featured-view-all-link">View all featured</a>
                </div>

                <a href="products.html?filter=featured" class="featured-callout">
                    <span class="featured-callout-eyebrow">Featured collection</span>
                    <h2 class="featured-callout-title">Come check our best sellers</h2>
                </a>
            </div>
        </section>

        <!--****      ---------------        ****-->
        <!--****       Deals  panel          ****-->
        <!--****      ---------------        ****-->
        <section class="deals-panel" id="deals-panel" >
            <div class="deals-panel-inner">
                <div class="deals-tags-section">
                    <button type="button" class="deals-tags-arrow deals-tags-arrow-left" aria-label="Scroll deals tags left">
                        <img src="images/ui/arrows/arrow.svg" alt="" class="icon">
                    </button>

                    <div class="deals-tags-wrapper">
                        <div class="deals-tags">
                        <!-- JS will render tag buttons -->
                        </div>
                    </div>

                    <button type="button" class="deals-tags-arrow deals-tags-arrow-right" aria-label="Scroll deals tags right">
                        <img src="images/ui/arrows/arrow.svg" alt="" class="icon">
                    </button>
                </div>

                <div class="deals-products">
                <!-- JS will render deal product cards -->
                </div>

                <a href="products.html?filter=onsale" class="deals-callout">
                    <span class="deals-callout-eyebrow">Special offers</span>
                    <h2 class="deals-callout-title">Come check our best deals</h2>
                </a>
            </div>
        </section>




        <!--  ----------------------------------------------------------------------- -->
        <!--  ------------------- mobile breakpoint specific ------------------------ -->
        <!--  ----------------------------------------------------------------------- -->
        <!-- 
            clicking the hamburger button displays a menue of the nav links that takes all the scrren
        -->
        <aside class="mobile-menu" aria-label="Mobile navigation">
            <div class="mobile-menu-content">

                <button type="button" class="mobile-close-btn" aria-label="Close menu">
                    <img src="images/ui/icons/icon-close.svg" alt="" class="icon">
                </button>

                <ul class="mobile-nav-links">
                    <li>
                        <a href="products.html?filter=all" class="mobile-nav-link">Shop</a>
                    </li>
                    <li>
                        <a href="products.html?filter=featured" class="mobile-nav-link">Featured</a>
                    </li>
                    <li>
                        <a href="products.html?filter=onsale" class="mobile-nav-link">Deals</a>
                    </li>
                    <li>
                        <a href="products.html" class="mobile-nav-link">Services</a>
                    </li>
                </ul>

             </div>
        </aside>

       
    </header>

    <main class="site-main">

        <div class="container">
            <form class="form-box" id="registrationForm" action="submit"
                onsubmit="event.preventDefault(); registerUser();">
                <h2>Create Your Account</h2>

                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" placeholder="Enter your full name" required>
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Create a password" required>
                </div>

                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Re-enter your password" required>
                </div>

                <div class="input-group">
                    <label>Phone</label>
                    <input type="tel" id="phone" placeholder="Enter your phone number" required>
                </div>

                <div class="input-group">
                    <label>Address</label>
                    <input type="text" id="address" placeholder="Enter your address" required>
                </div>
                <div class="input-group">
                    <label>Account Type</label>
                    <select id="accountType" required>
                        <option value="">Select account type</option>
                        <option value="customer">Customer</option>
                        <option value="business">Business</option>
                    </select>
                </div>

                <button type="submit" class="btn">Create Account</button>

                <p class="login-text">
                    Already have an account? <a href="login.html">Login</a>
                </p>
            </form>

        </div>

    </main>

    <footer class="site-footer">
        <div class="container">
            <nav>

            </nav>
        </div>
    </footer>
    <script src="js/data.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/main.js"></script>
    <script src="js/users.js"></script>
    <script>
        function registerUser() {

            const user = {
                fullname: document.getElementById("fullName").value,
                email: document.getElementById("email").value,
                password: document.getElementById("password").value,
                phone: document.getElementById("phone").value,
                address: document.getElementById("address").value,
                type: document.getElementById("accountType").value
            };

            let users = JSON.parse(localStorage.getItem("users")) || [];

            // Check if email already exists
            if (users.some(u => u.email === user.email)) {
                alert("Email already registered");
                return;
            }

            users.push(user);
            localStorage.setItem("users", JSON.stringify(users));

            alert("Account created successfully");
            console.log(users);
            window.location.href = "login.html";
        }
    </script>

</body>

</html>
