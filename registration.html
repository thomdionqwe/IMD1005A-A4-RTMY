<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carve & Co. | Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login_registration.css">
</head>

<body>
    <header class="site-header">
        <div class="container">
            <nav>
                <h1>Logo</h1>
            </nav>
        </div>
    </header>

    <main class="site-main">

        <div class="container">
            <form class="login-form" id="loginForm" action="submit">
                <h2>Login</h2>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn">Login</button>

                <p class="signup-text">
                    New here? <a href="#">Create an account</a>
                </p>
            </form>
        </div>

    </main>

    <footer class="site-footer">
        <div class="container">
            <nav>

            </nav>
        </div>
    </footer>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script src="js/users.js"></script>
    <script>
        document.getElementById("loginForm").addEventListener("submit", function (event) {
            event.preventDefault();

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const userId = validateLogin(email, password);

            if (userId > 0) {
                location.href = `index.html?userid=${userId}`;
            } else {
                alert("Invalid email or password. Please try again.");
            }
        });
    </script>
</body>

</html>
