<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carve & Co. | Payment</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login_registration.css">

</head>

<body>
    <header class="site-header">
        <div class="container">
            <nav>

            </nav>
        </div>
    </header>

    <main class="site-main">
        <div class="container payment-layout">

            <!-- ORDER SUMMARY -->
            <div class="form-box summary-box">
                <h2>Order Summary</h2>

                <div class="input-group">
                    <label>Subtotal</label>
                    <input type="text" id="subtotal" value="100.00" readonly>
                </div>

                <div class="input-group">
                    <label>GST (5%)</label>
                    <input type="text" id="gst" readonly>
                </div>

                <div class="input-group">
                    <label>HST (13%)</label>
                    <input type="text" id="hst" readonly>
                </div>

                <div class="input-group">
                    <label><strong>Grand Total</strong></label>
                    <input type="text" id="grandTotal" readonly>
                </div>
            </div>

            <!-- PAYMENT FORM -->
            <form class="form-box payment-box" onsubmit="event.preventDefault(); processPayment();">
                <h2>Payment Details</h2>

                <div class="input-group">
                    <label>Cardholder Name</label>
                    <input type="text" id="cardName" placeholder="Name on card" required>
                </div>

                <div class="input-group">
                    <label>Card Number</label>
                    <input type="text" id="cardNumber" maxlength="16" placeholder="1234567890123456" required>
                </div>

                <div class="input-group">
                    <label>Expiry Date</label>
                    <input type="month" id="expiry" required>
                </div>

                <div class="input-group">
                    <label>CVV</label>
                    <input type="password" id="cvv" maxlength="3" placeholder="123" required>
                </div>

                <button type="submit" class="btn">Pay Now</button>
            </form>

        </div>
    </main>


    <footer class="site-footer">
        <div class="container">
            <nav>

            </nav>
        </div>
    </footer>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script src="js/users.js"></script>
    <script>
        function processPayment() {
            const name = document.getElementById("cardName").value.trim();
            const number = document.getElementById("cardNumber").value.trim();
            const expiry = document.getElementById("expiry").value;
            const cvv = document.getElementById("cvv").value.trim();

            // Basic validation
            if (name.length < 3) {
                alert("Enter a valid cardholder name");
                return;
            }

            if (!/^\d{16}$/.test(number)) {
                alert("Card number must be 16 digits");
                return;
            }

            if (!expiry) {
                alert("Select a valid expiry date");
                return;
            }

            if (!/^\d{3}$/.test(cvv)) {
                alert("CVV must be 3 digits");
                return;
            }

            alert("Payment Successful!");
            window.location.href = "index.html";
        }
    </script>
</body>

</html>
