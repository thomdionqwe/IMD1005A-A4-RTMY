<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carve & Co. | Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login_registration.css">
</head>

<body>
    <header class="site-header">
        <div class="container">
            <nav>
                <h1>Logo</h1>
            </nav>
        </div>
    </header>

    <main class="site-main">

        <div class="container">
            <form class="form-box" id="loginForm" action="submit" onsubmit="event.preventDefault(); loginUser();">
                <h2>Login</h2>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn">Login</button>

                <p class="signup-text">
                    New here? <a href="registration.html">Create an account</a>
                </p>
            </form>
        </div>

    </main>

    <footer class="site-footer">
        <div class="container">
            <nav>

            </nav>
        </div>
    </footer>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script src="js/users.js"></script>
    <script>
        function loginUser() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            let users = JSON.parse(localStorage.getItem("users")) || [];

            const found = users.find(u => u.email === email && u.password === password);

            if (found) {
                alert("Login successful");

                // Save session
                localStorage.setItem("loggedInUser", JSON.stringify(found));

                // Redirect to homepage
                window.location.href = "index.html";
            } else {
                alert("Invalid email or password");
            }
        }


    </script>
</body>

</html>
